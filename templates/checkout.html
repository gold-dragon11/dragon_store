<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Shadow of the Dragon</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=24.0">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body style="background: #000; color: #e0e0e0; font-family: 'Montserrat', sans-serif;">
    <div class="site-wrap">
        <nav class="nav">
            <div class="container nav-row" style="display: flex; justify-content: space-between; align-items: center; padding: 20px;">
                <a href="/" style="text-decoration: none;"><h1 style="color: #d4af37; font-family: 'Cinzel'; font-size: 1.2rem;">Shadow of the Dragon</h1></a>
                <a href="{{ url_for('cart') }}" style="color: #d4af37; text-decoration: none; font-size: 0.8rem; letter-spacing: 2px;">BACK TO CART</a>
            </div>
        </nav>

        <section style="padding-top: 120px; max-width: 600px; margin: 0 auto; padding-left: 20px; padding-right: 20px; padding-bottom: 50px;">
            <h2 style="font-family: 'Cinzel'; color: #d4af37; text-transform: uppercase; letter-spacing: 3px; text-align: center;">Delivery Details</h2>
            <div style="background: #d4af37; height: 1px; width: 50px; margin: 0 auto 40px;"></div>

            <form id="order-form" action="{{ url_for('checkout') }}" method="post" style="display: flex; flex-direction: column; gap: 20px;" onsubmit="disableSubmitButton()">
                
                <div>
                    <label style="color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Full Name</label>
                    <input type="text" name="name" required style="width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; padding: 15px 0; font-size: 1rem; outline: none; font-family: 'Montserrat';">
                </div>

                <div>
                    <label style="color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Phone Number</label>
                    <input type="tel" name="phone" required placeholder="+380" style="width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; padding: 15px 0; font-size: 1rem; outline: none; font-family: 'Montserrat';">
                </div>

                <div style="position: relative; margin-bottom: 20px;">
                    <label style="color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">City</label>
                    
                    <input type="text" id="city-input" name="city" required autocomplete="off" 
                           placeholder="Start typing your city..."
                           style="width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; padding: 15px 0; font-size: 1rem; outline: none; font-family: 'Montserrat';">
                    
                    <div id="city-dropdown" class="autocomplete-dropdown"></div>
                </div>  

                <div style="position: relative; margin-bottom: 20px;">
                    <label style="color: #888; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px;">Nova Poshta Branch / Locker</label>
                    
                    <input type="text" id="warehouse-input" name="nova_poshta" required autocomplete="off" 
                           placeholder="Select city first..." disabled
                           style="width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(212, 175, 55, 0.5); color: #d4af37; padding: 15px 0; font-size: 1rem; outline: none; font-family: 'Montserrat'; opacity: 0.5; transition: all 0.3s ease;">
                    
                    <div id="warehouse-dropdown" class="autocomplete-dropdown"></div>
                </div>

                <div style="margin-top: 30px; text-align: center;">
                    <p style="font-size: 1.2rem; color: #e0e0e0; margin-bottom: 20px;">Total to pay: <span style="color: #d4af37;">{{ "%.2f"|format(total) }} UAH</span></p>
                    <button type="submit" id="submit-order-btn" class="btn-gold" style="width: 100%; padding: 20px; font-size: 1rem; letter-spacing: 2px;">
                        CONFIRM ORDER
                    </button>
                    <p style="color: #555; font-size: 0.75rem; margin-top: 15px;">Payment is processed upon delivery.</p>
                </div>
            </form>
        </section>
    </div>
    <script>
        function disableSubmitButton() {
            const btn = document.getElementById('submit-order-btn');
            // Блокуємо кнопку миттєво після натискання
            btn.disabled = true;
            btn.innerText = "WEAVING THE DRAGON..."; // Можна додати брендового стилю замість PROCESSING
            btn.style.opacity = "0.5";
            btn.style.cursor = "not-allowed";
            return true;
        }
        </script>
        <script>
            const API_KEY = '189dad8305ca06f92281f2d5811ec4c2'; // Впиши ключ до кінця
            
            const cityInput = document.getElementById('city-input');
            const cityDropdown = document.getElementById('city-dropdown');
            const warehouseInput = document.getElementById('warehouse-input');
            const warehouseDropdown = document.getElementById('warehouse-dropdown');
            
            let selectedCityRef = ""; // Тут зберігатиметься ID міста для пошуку відділень
            
            // --- 1. ПОШУК МІСТА ЧЕРЕЗ API ---
            cityInput.addEventListener('input', async function() {
                const val = this.value;
                if (val.length < 2) {
                    cityDropdown.style.display = 'none';
                    return;
                }
            
                try {
                    const response = await fetch('https://api.novaposhta.ua/v2.0/json/', {
                        method: 'POST',
                        body: JSON.stringify({
                            "apiKey": API_KEY,
                            "modelName": "Address",
                            "calledMethod": "getCities",
                            "methodProperties": { "FindByString": val }
                        })
                    });
                    
                    const res = await response.json();
                    cityDropdown.innerHTML = '';
                    
                    if (res.success && res.data.length > 0) {
                        res.data.forEach(city => {
                            const div = document.createElement('div');
                            div.className = 'autocomplete-item';
                            div.innerHTML = city.Description;
                            div.onclick = () => {
                                cityInput.value = city.Description;
                                selectedCityRef = city.Ref; // Отримуємо Ref для наступного кроку
                                cityDropdown.style.display = 'none';
                                
                                // Активуємо поле відділень
                                warehouseInput.disabled = false;
                                warehouseInput.style.opacity = "1";
                                warehouseInput.placeholder = "Branch number or street...";
                            };
                            cityDropdown.appendChild(div);
                        });
                        cityDropdown.style.display = 'block';
                    }
                } catch (e) {
                    console.error("Помилка API міст:", e);
                }
            });
            
            // --- 2. ПОШУК ВІДДІЛЕННЯ ЧЕРЕЗ API ---
            warehouseInput.addEventListener('input', async function() {
    const val = this.value;
    if (!selectedCityRef) return;

    // Очищуємо введений текст від символів №, пробілів тощо, щоб залишити тільки цифри для порівняння
    const cleanSearch = val.replace(/\D/g, ''); 

    try {
        const response = await fetch('https://api.novaposhta.ua/v2.0/json/', {
            method: 'POST',
            body: JSON.stringify({
                "apiKey": API_KEY,
                "modelName": "Address",
                "calledMethod": "getWarehouses",
                "methodProperties": {
                    "CityRef": selectedCityRef,
                    "FindByString": val
                }
            })
        });
        
        const res = await response.json();
        warehouseDropdown.innerHTML = '';
        
        if (res.success && res.data.length > 0) {
            // СТРОГА ФІЛЬТРАЦІЯ
            const filteredData = res.data.filter(wh => {
                // Витягуємо номер відділення з опису (наприклад, "№20" -> "20")
                const branchNumber = wh.Description.match(/№\s*(\d+)/);
                if (!branchNumber) return wh.Description.toLowerCase().includes(val.toLowerCase());
                
                // Якщо ми шукаємо конкретне число (наприклад, 20),
                // ми перевіряємо, чи номер відділення ПОЧИНАЄТЬСЯ з цих цифр
                return branchNumber[1].startsWith(cleanSearch);
            });

            filteredData.forEach(wh => {
                const div = document.createElement('div');
                div.className = 'autocomplete-item';
                div.innerHTML = wh.Description;
                div.onclick = () => {
                    warehouseInput.value = wh.Description;
                    warehouseDropdown.style.display = 'none';
                };
                warehouseDropdown.appendChild(div);
            });
            
            warehouseDropdown.style.display = filteredData.length > 0 ? 'block' : 'none';
        }
    } catch (e) {
        console.error("Помилка API:", e);
    }
        });
            
            // Закриття списків, якщо клікнули десь поруч
            document.addEventListener('click', (e) => {
                if (!cityInput.contains(e.target)) cityDropdown.style.display = 'none';
                if (!warehouseInput.contains(e.target)) warehouseDropdown.style.display = 'none';
            });
            </script>
            <script>
                document.getElementById('order-form').onsubmit = function() {
                    // 1. Знаходимо твою золоту кнопку за ID
                    const btn = document.getElementById('submit-order-btn');
                    
                    // 2. Вимикаємо її відразу після кліку
                    btn.disabled = true;
                    
                    // 3. Змінюємо дизайн, щоб було зрозуміло, що йде відправка
                    btn.innerText = "PROCESSING...";
                    btn.style.opacity = "0.6";
                    btn.style.cursor = "not-allowed";
                    
                    // Форма відправиться автоматично один раз
                };
                </script>
</body>
</html>
